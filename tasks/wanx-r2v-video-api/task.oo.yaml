inputs_def:
  - handle: prompt
    description: "%wanx-r2v-video-api-prompt%"
    json_schema:
      type: string
      maxLength: 1500
    nullable: false

  - handle: reference_urls
    description: "%wanx-r2v-video-api-reference-urls%"
    json_schema:
      type: array
      items:
        type: string
        format: uri
      minItems: 1
      maxItems: 5
    nullable: false

  - group: Advanced Options
    collapsed: true

  - handle: model
    description: "%wanx-r2v-video-api-model%"
    json_schema:
      enum:
        - wan2.6-r2v-flash
        - wan2.6-r2v
      ui:options:
        labels:
          - Wan2.6 R2V Flash (Fast)
          - Wan2.6 R2V (Quality)
    value: wan2.6-r2v-flash
    nullable: true

  - handle: negative_prompt
    description: "%wanx-r2v-video-api-negative-prompt%"
    json_schema:
      type: string
      maxLength: 500
    value:
    nullable: true

  - handle: size
    description: "%wanx-r2v-video-api-size%"
    json_schema:
      enum:
        - "1280*720"
        - "720*1280"
        - "960*960"
        - "1088*832"
        - "832*1088"
        - "1920*1080"
        - "1080*1920"
        - "1440*1440"
        - "1632*1248"
        - "1248*1632"
      ui:options:
        labels:
          - "1280x720 (16:9)"
          - "720x1280 (9:16)"
          - "960x960 (1:1)"
          - "1088x832 (4:3)"
          - "832x1088 (3:4)"
          - "1920x1080 (16:9 FHD)"
          - "1080x1920 (9:16 FHD)"
          - "1440x1440 (1:1)"
          - "1632x1248 (4:3)"
          - "1248x1632 (3:4)"
    value: 1920*1080
    nullable: true

  - handle: duration
    description: "%wanx-r2v-video-api-duration%"
    json_schema:
      type: integer
      minimum: 2
      maximum: 10
    value: 5
    nullable: true

  - handle: shot_type
    description: "%wanx-r2v-video-api-shot-type%"
    json_schema:
      enum:
        - single
        - multi
      ui:options:
        labels:
          - Single Shot
          - Multi Shot
    value:
    nullable: true

  - handle: audio
    description: "%wanx-r2v-video-api-audio%"
    json_schema:
      type: boolean
    value: true
    nullable: true

  - handle: watermark
    description: "%wanx-r2v-video-api-watermark%"
    json_schema:
      type: boolean
    value: false
    nullable: true

  - handle: seed
    description: "%wanx-r2v-video-api-seed%"
    json_schema:
      type: integer
      minimum: 0
      maximum: 2147483647
    value:
    nullable: true

outputs_def:
  - handle: video_url
    description: "%wanx-r2v-video-api-video-url%"
    json_schema:
      type: string
    nullable: false

  - handle: task_id
    description: "%wanx-r2v-video-api-task-id%"
    json_schema:
      type: string
    nullable: false

  - handle: resolution
    description: "%wanx-r2v-video-api-resolution-output%"
    json_schema:
      type: string
    nullable: false

  - handle: audio
    description: "%wanx-r2v-video-api-audio-output%"
    json_schema:
      type: boolean
    nullable: false

  - handle: output_video_duration
    description: "%wanx-r2v-video-api-output-video-duration%"
    json_schema:
      type: number
    nullable: false

executor:
  name: nodejs
  options:
    entry: index.ts

title: "%wanx-r2v-video-api-title%"
icon: ":carbon:video:"
description: "%wanx-r2v-video-api-description%"
private: true
