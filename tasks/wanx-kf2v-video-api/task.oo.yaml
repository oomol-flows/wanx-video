inputs_def:
  - handle: first_frame_url
    description: "%wanx-kf2v-video-api-first-frame-url%"
    json_schema:
      type: string
      format: uri
    nullable: false

  - group: Advanced Options
    collapsed: true

  - handle: model
    description: "%wanx-kf2v-video-api-model%"
    json_schema:
      enum:
        - wan2.2-kf2v-flash
        - wanx2.1-kf2v-plus
      ui:options:
        labels:
          - Wan2.2 KF2V Flash (Fast)
          - Wanx2.1 KF2V Plus (Quality)
    value: wan2.2-kf2v-flash
    nullable: true

  - handle: last_frame_url
    description: "%wanx-kf2v-video-api-last-frame-url%"
    json_schema:
      type: string
      format: uri
    value:
    nullable: true

  - handle: prompt
    description: "%wanx-kf2v-video-api-prompt%"
    json_schema:
      type: string
      maxLength: 800
    value:
    nullable: true

  - handle: template
    description: "%wanx-kf2v-video-api-template%"
    json_schema:
      type: string
    value:
    nullable: true

  - handle: negative_prompt
    description: "%wanx-kf2v-video-api-negative-prompt%"
    json_schema:
      type: string
      maxLength: 500
    value:
    nullable: true

  - handle: resolution
    description: "%wanx-kf2v-video-api-resolution%"
    json_schema:
      enum:
        - 480P
        - 720P
        - 1080P
      ui:options:
        labels:
          - 480P
          - 720P (HD)
          - 1080P (Full HD)
    value: 720P
    nullable: true

  - handle: prompt_extend
    description: "%wanx-kf2v-video-api-prompt-extend%"
    json_schema:
      type: boolean
    value: true
    nullable: true

  - handle: watermark
    description: "%wanx-kf2v-video-api-watermark%"
    json_schema:
      type: boolean
    value: false
    nullable: true

  - handle: seed
    description: "%wanx-kf2v-video-api-seed%"
    json_schema:
      type: integer
      minimum: 0
      maximum: 2147483647
    value:
    nullable: true

outputs_def:
  - handle: video_url
    description: "%wanx-kf2v-video-api-video-url%"
    json_schema:
      type: string
    nullable: false

  - handle: task_id
    description: "%wanx-kf2v-video-api-task-id%"
    json_schema:
      type: string
    nullable: false

  - handle: resolution
    description: "%wanx-kf2v-video-api-resolution-output%"
    json_schema:
      type: string
    nullable: false

  - handle: audio
    description: "%wanx-kf2v-video-api-audio%"
    json_schema:
      type: boolean
    nullable: false

  - handle: output_video_duration
    description: "%wanx-kf2v-video-api-output-video-duration%"
    json_schema:
      type: number
    nullable: false

executor:
  name: nodejs
  options:
    entry: index.ts

title: "%wanx-kf2v-video-api-title%"
icon: ":carbon:video:"
description: "%wanx-kf2v-video-api-description%"
private: true
